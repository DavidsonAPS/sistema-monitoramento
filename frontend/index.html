<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Sistema de Monitoramento</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet"
        href="style.css">

</head>

<body>

    <nav class="navbar navbar-dark bg-dark shadow">

    <div class="container-fluid">

        <span class="navbar-brand">

            <i class="bi bi-cpu"></i>

            Sistema de Monitoramento

        </span>

        <div class="d-flex align-items-center gap-3">

            <span
                id="nomeUsuario"
                class="text-white fw-bold">
            </span>

            <button
                onclick="logout()"
                class="btn btn-danger btn-sm">

                Sair

            </button>

        </div>

    </div>

</nav>

    <div class="container mt-4">

    <div class="row g-4 mb-4">

        <div class="col-md-3">

            <div class="card card-info shadow border-0">

                <div class="card-body">

                    <h5>Total de Dispositivos</h5>

                    <h1 id="totalSensores">0</h1>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card card-success shadow border-0">

                <div class="card-body">

                    <h5>Online</h5>

                    <h1 id="ativos">0</h1>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card card-danger shadow border-0">

                <div class="card-body">

                    <h5>Offline</h5>

                    <h1 id="inativos">0</h1>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card card-warning shadow border-0">

                <div class="card-body">

                    <h5>Usuário</h5>

                    <h6 id="nomeUsuario">
                        Carregando...
                    </h6>

                </div>

            </div>

        </div>

    </div>

    <div class="card shadow border-0">

        <div class="card-body">

            <div
                class="d-flex justify-content-between align-items-center mb-4"
            >

                <h3>
                    📱 Dispositivos Conectados
                </h3>

                <button
                    onclick="logout()"
                    class="btn btn-danger"
                >

                    Sair

                </button>

            </div>

            <div id="cardsSensores"></div>

        </div>

    </div>

</div>
    <div class="modal fade"
        id="modalEditar"
        tabindex="-1">

        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title">

                        Editar Sensor

                    </h5>

                    <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">

                    </button>

                </div>

                <div class="modal-body">

                    <input type="hidden"
                        id="editId">

                    <div class="mb-3">

                        <input type="text"
                            id="editNome"
                            class="form-control"
                            placeholder="Nome">

                    </div>

                    <div class="mb-3">

                        <input type="text"
                            id="editLocalizacao"
                            class="form-control"
                            placeholder="Localização">

                    </div>

                    <div class="mb-3">

                        <select id="editStatus"
                            class="form-select">

                            <option value="Ativo">
                                Ativo
                            </option>

                            <option value="Inativo">
                                Inativo
                            </option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <input type="number"
                            id="editTemperatura"
                            class="form-control"
                            placeholder="Temperatura">

                    </div>

                </div>

                <div class="modal-footer">

                    <button class="btn btn-secondary"
                        data-bs-dismiss="modal">

                        Cancelar

                    </button>

                    <button class="btn btn-primary"
                        onclick="salvarEdicao()">

                        Salvar

                    </button>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <script src="script.js"></script>

</body>

</html>

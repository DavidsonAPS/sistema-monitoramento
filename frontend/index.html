<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Sistema de Monitoramento</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet"
        href="style.css">

</head>

<body>

    <nav class="navbar navbar-dark bg-dark shadow">

        <div class="container-fluid">

            <span class="navbar-brand">

                <i class="bi bi-cpu"></i>

                Sistema de Monitoramento

            </span>

        </div>

    </nav>

    <div class="container mt-4">

        <div class="row g-4 mb-4">

            <div class="col-md-3">

                <div class="card card-info shadow border-0">

                    <div class="card-body">

                        <h5>Total de Sensores</h5>

                        <h1 id="totalSensores">0</h1>

                    </div>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card card-success shadow border-0">

                    <div class="card-body">

                        <h5>Ativos</h5>

                        <h1 id="ativos">0</h1>

                    </div>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card card-danger shadow border-0">

                    <div class="card-body">

                        <h5>Inativos</h5>

                        <h1 id="inativos">0</h1>

                    </div>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card card-warning shadow border-0">

                    <div class="card-body">

                        <h5>Temperatura Média</h5>

                        <h1 id="temperaturaMedia">0°C</h1>

                    </div>

                </div>

            </div>

        </div>

        <div class="card shadow border-0 mb-4">

            <div class="card-body">

                <h3 class="mb-4">

                    <i class="bi bi-plus-circle"></i>

                    Novo Sensor

                </h3>

                <form id="sensorForm">

                    <div class="row">

                        <div class="col-md-3 mb-3">

                            <input type="text"
                                id="nome"
                                class="form-control"
                                placeholder="Nome">

                        </div>

                        <div class="col-md-3 mb-3">

                            <input type="text"
                                id="localizacao"
                                class="form-control"
                                placeholder="Localização">

                        </div>

                        <div class="col-md-2 mb-3">

                            <select id="status"
                                class="form-select">

                                <option value="Ativo">
                                    Ativo
                                </option>

                                <option value="Inativo">
                                    Inativo
                                </option>

                            </select>

                        </div>

                        <div class="col-md-2 mb-3">

                            <input type="number"
                                id="temperatura"
                                class="form-control"
                                placeholder="Temperatura">

                        </div>

                        <div class="col-md-2 mb-3">

                            <button class="btn btn-dark w-100">

                                Salvar

                            </button>

                        </div>

                    </div>

                </form>

            </div>

        </div>

        <div class="card shadow border-0 mb-4">

            <div class="card-body">

                <h3 class="mb-4">

                    <i class="bi bi-bar-chart"></i>

                    Monitoramento

                </h3>

                <div class="grafico-container">

                    <canvas id="graficoSensores"></canvas>

                </div>

            </div>

        </div>

        <div class="card shadow border-0">

            <div class="card-body">

                <div class="d-flex justify-content-between align-items-center mb-4">

                    <h3>

                        <i class="bi bi-table"></i>

                        Sensores

                    </h3>

                    <input type="text"
                        id="pesquisa"
                        class="form-control w-25"
                        placeholder="Pesquisar sensor">

                </div>

                <div class="table-responsive">

                    <table class="table table-hover align-middle">

                        <thead class="table-dark">

                            <tr>

                                <th>ID</th>
                                <th>Nome</th>
                                <th>Localização</th>
                                <th>Status</th>
                                <th>Temperatura</th>
                                <th>Ações</th>

                            </tr>

                        </thead>

                        <tbody id="tabelaSensores">

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

    <div class="modal fade"
        id="modalEditar"
        tabindex="-1">

        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title">

                        Editar Sensor

                    </h5>

                    <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">

                    </button>

                </div>

                <div class="modal-body">

                    <input type="hidden"
                        id="editId">

                    <div class="mb-3">

                        <input type="text"
                            id="editNome"
                            class="form-control"
                            placeholder="Nome">

                    </div>

                    <div class="mb-3">

                        <input type="text"
                            id="editLocalizacao"
                            class="form-control"
                            placeholder="Localização">

                    </div>

                    <div class="mb-3">

                        <select id="editStatus"
                            class="form-select">

                            <option value="Ativo">
                                Ativo
                            </option>

                            <option value="Inativo">
                                Inativo
                            </option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <input type="number"
                            id="editTemperatura"
                            class="form-control"
                            placeholder="Temperatura">

                    </div>

                </div>

                <div class="modal-footer">

                    <button class="btn btn-secondary"
                        data-bs-dismiss="modal">

                        Cancelar

                    </button>

                    <button class="btn btn-primary"
                        onclick="salvarEdicao()">

                        Salvar

                    </button>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <script src="script.js"></script>

</body>

</html>
